<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yerikson Varela · YAVL</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #050505;
            --bg-soft: #0b0b0b;
            --surface: rgba(12, 12, 12, 0.94);
            --surface-2: rgba(20, 20, 20, 0.96);
            --gold: #c9a84c;
            --gold-light: #e5c97b;
            --gold-border: rgba(201, 168, 76, 0.2);
            --gold-muted: rgba(201, 168, 76, 0.1);
            --text: #d8d8d8;
            --text-muted: #868686;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            --bar-height: 88px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top left, rgba(201, 168, 76, 0.08), transparent 26%),
                radial-gradient(circle at bottom right, rgba(201, 168, 76, 0.05), transparent 22%),
                var(--bg);
            color: var(--text);
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            overflow-x: hidden;
        }

        body {
            min-height: 100dvh;
        }

        button {
            font: inherit;
        }

        .system-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            min-height: var(--bar-height);
            padding: 16px 22px;
            background: rgba(5, 5, 5, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.08);
        }

        .brand {
            display: grid;
            gap: 4px;
            min-width: 0;
        }

        .brand-kicker {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .brand-title {
            margin: 0;
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-size: clamp(1rem, 2.2vw, 1.34rem);
            font-weight: 400;
            color: var(--gold-light);
            letter-spacing: 0.03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .brand-sub {
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 0.65em;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bar-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .view-switch {
            display: inline-grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(201, 168, 76, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.12);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .view-tab {
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.22s ease, border-color 0.22s ease, color 0.22s ease, transform 0.22s ease;
        }

        .view-tab:hover {
            color: var(--gold-light);
            border-color: rgba(201, 168, 76, 0.16);
        }

        .view-tab[aria-selected="true"] {
            color: var(--gold-light);
            background: rgba(201, 168, 76, 0.12);
            border-color: var(--gold-border);
        }

        .shell {
            padding-top: var(--bar-height);
        }

        .master-view {
            display: none;
            padding: 18px;
        }

        .master-view.active {
            display: block;
        }

        /* ── Search button ── */
        .search-trigger {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(201,168,76,0.06);
            border: 1px solid rgba(201,168,76,0.14);
            color: var(--text-muted);
            padding: 0 14px;
            min-height: 40px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }
        .search-trigger:hover {
            background: rgba(201,168,76,0.11);
            border-color: rgba(201,168,76,0.26);
            color: var(--gold-light);
        }
        .search-trigger svg { flex-shrink: 0; }

        /* Indicador de filtro activo en el botón de búsqueda */
        .search-trigger.search-active {
            background: rgba(201,168,76,0.14);
            border-color: rgba(201,168,76,0.4);
            color: var(--gold-light);
        }
        .search-trigger .search-filter-badge {
            display: none;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }
        .search-trigger.search-active .search-filter-badge { display: block; }

        /* ── Search overlay ── */
        /* Suprimir el app-bar interno de los templates cuando están dentro del monolito */
        .view-content .app-bar { display: none !important; }

        #searchOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: clamp(70px,10vw,120px) 16px 24px;
            overflow-y: auto;
        }
        #searchOverlay.open { display: block; }

        .search-box {
            max-width: 680px;
            margin: 0 auto;
        }

        .search-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(16,16,16,0.96);
            border: 1px solid rgba(201,168,76,0.22);
            border-radius: 16px;
            padding: 0 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .search-input-row svg { flex-shrink: 0; opacity: 0.5; }

        #searchInput {
            flex: 1;
            background: transparent;
            border: 0;
            outline: none;
            color: var(--text);
            font-family: "Inter", "Segoe UI", sans-serif;
            font-size: 1.05rem;
            padding: 16px 0;
            letter-spacing: 0.01em;
        }
        #searchInput::placeholder { color: var(--text-muted); }

        #searchClear {
            background: transparent;
            border: 0;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            font-size: 1.1rem;
            line-height: 1;
            transition: color 0.18s;
            display: none;
        }
        #searchClear.visible { display: block; }
        #searchClear:hover { color: var(--gold-light); }

        .search-meta {
            margin: 12px 0 8px;
            font-size: 0.76rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            min-height: 18px;
        }

        .search-results { display: grid; gap: 8px; }

        .search-result-item {
            background: rgba(14,14,14,0.94);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
            text-align: left;
            width: 100%;
        }
        .search-result-item:hover {
            background: rgba(201,168,76,0.07);
            border-color: rgba(201,168,76,0.26);
        }
        .result-tag {
            font-size: 0.67rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .result-title {
            font-size: 0.92rem;
            color: var(--text);
            font-weight: 500;
            margin-bottom: 4px;
        }
        .result-snippet {
            font-size: 0.79rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .result-snippet mark {
            background: rgba(201,168,76,0.22);
            color: var(--gold-light);
            border-radius: 3px;
            padding: 0 2px;
        }

        .search-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
        .search-empty-icon { font-size: 2rem; opacity: 0.3; margin-bottom: 10px; }

        /* ── Highlight persistente en resultados de búsqueda ── */
        .search-hit {
            background: rgba(201, 168, 76, 0.38);
            color: #fff;
            border-radius: 3px;
            padding: 0 2px;
            font-style: normal;
            font-weight: inherit;
        }

        @media (max-width: 860px) {
            .system-bar {
                flex-direction: column;
                align-items: stretch;
                justify-content: center;
                gap: 12px;
                padding: 12px 14px 10px;
                min-height: auto;
            }

            .brand-title {
                white-space: normal;
            }

            .bar-controls {
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .view-switch {
                flex: 1;
            }

            .view-tab {
                flex: 1;
            }

            .search-trigger {
                flex-shrink: 0;
                padding: 0 12px;
            }

            .search-trigger span { display: none; }

            .shell { padding-top: calc(var(--bar-height) + 36px); }
        }

        @media (max-width: 640px) {
            .master-view {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="system-bar">
        <div class="brand">
            <span class="brand-kicker">Sistema personal · monolito</span>
            <h1 class="brand-title">Yerikson Varela <small class="brand-sub">YAVL</small></h1>
        </div>

        <div class="bar-controls">
            <div class="view-switch" role="tablist" aria-label="Vistas maestras del sistema">
                <button class="view-tab" id="tab-codigo" type="button" role="tab" aria-controls="panel-codigo" aria-selected="true" data-view="codigo">Código</button>
                <button class="view-tab" id="tab-constitucion" type="button" role="tab" aria-controls="panel-constitucion" aria-selected="false" data-view="constitucion">Constitución</button>
            </div>

            <button class="search-trigger" id="searchTrigger" type="button" aria-label="Buscar en el sistema">
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><line x1="16" y1="16" x2="12.65" y2="12.65"/></svg>
                <span>Buscar</span>
                <span class="search-filter-badge" aria-hidden="true"></span>
            </button>
        </div>
    </header>

    <!-- Search overlay -->
    <div id="searchOverlay" role="dialog" aria-modal="true" aria-label="Búsqueda del sistema">
        <div class="search-box">
            <div class="search-input-row">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><line x1="16" y1="16" x2="12.65" y2="12.65"/></svg>
                <input id="searchInput" type="search" placeholder="Buscar en Código y Constitución…" autocomplete="off" autocorrect="off" spellcheck="false" />
                <button id="searchClear" type="button" aria-label="Limpiar búsqueda">✕</button>
            </div>
            <p class="search-meta" id="searchMeta"></p>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <main class="shell">
        <section class="master-view active" id="panel-codigo" role="tabpanel" aria-labelledby="tab-codigo" data-panel="codigo">
            <div class="view-content" id="view-codigo">
                <!-- Contenido del Código se inserta aquí dinámicamente -->
            </div>
        </section>

        <section class="master-view" id="panel-constitucion" role="tabpanel" aria-labelledby="tab-constitucion" data-panel="constitucion">
            <div class="view-content" id="view-constitucion">
                <!-- Contenido de la Constitución se inserta aquí dinámicamente -->
            </div>
        </section>
    </main>

    <template id="template-codigo">
<style>
/* FONT FALLBACKS FOR OFFLINE */
        @font-face{font-family:'Playfair Display';font-display:swap;src:local('Playfair Display'),local('Georgia'),local('Times New Roman')}
        @font-face{font-family:'Inter';font-display:swap;src:local('Inter'),local('Segoe UI'),local('Arial')}
        @font-face{font-family:'JetBrains Mono';font-display:swap;src:local('JetBrains Mono'),local('Consolas'),local('Courier New')}

        :root{
            --bg:#050505;--bg2:#0a0a0a;--bg3:#0f0f0f;
            --gold:#C9A84C;--gold-l:#E5C97B;--gold-d:#9A7A30;--gold-m:rgba(201,168,76,.12);--gold-b:rgba(201,168,76,.2);--gold-g:rgba(201,168,76,.08);
            --red:#8B0000;--red-m:rgba(139,0,0,.1);
            --text:#D4D4D4;--text-m:#808080;--text-d:#555;
            --white:#F0F0F0;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none}
        html::-webkit-scrollbar{display:none;width:0;height:0}
        body{font-family:'Inter',system-ui,sans-serif;background:radial-gradient(circle at top left,rgba(201,168,76,.06),transparent 24%),var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;-webkit-tap-highlight-color:transparent;scrollbar-width:none;-ms-overflow-style:none}
        body::-webkit-scrollbar{display:none;width:0;height:0}
        button,input,textarea{font:inherit}
        textarea{resize:vertical}

        /* COVER */
        #cover{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:30px}
        #cover.out{animation:cOut 1.2s ease forwards}
        @keyframes cOut{to{opacity:0;transform:scale(1.05)}}

        .c-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-d),transparent);margin:20px auto}
        .c-symbol{font-size:3em;margin-bottom:20px;opacity:.6;animation:cPulse 3s ease infinite}
        @keyframes cPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.05)}}
        .c-title{font-family:'Playfair Display',serif;font-size:2em;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
        .c-sub{font-size:.85em;color:var(--text-m);letter-spacing:4px;text-transform:uppercase}
        .c-author{margin-top:30px;font-family:'Playfair Display',serif;font-style:italic;color:var(--gold-d);font-size:.9em}
        .c-hint{margin-top:30px;font-size:.75em;color:var(--text-d);animation:hBlink 2.5s ease infinite;letter-spacing:2px;text-transform:uppercase}
        @keyframes hBlink{0%,100%{opacity:.3}50%{opacity:.8}}

        /* FOCUS */
        :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}
        .home-card:focus-visible,.reset-btn:focus-visible{outline-color:var(--gold-l);border-radius:0}
        .check-item:focus-visible{outline:2px solid var(--gold);outline-offset:1px;border-radius:6px}
        #cover:focus-visible{outline:2px solid var(--gold-d);outline-offset:6px}

        /* REDUCED MOTION */
        @media(prefers-reduced-motion:reduce){
            *{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
            html{scroll-behavior:auto}
        }

        /* APP BAR */
        .app-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,5,5,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.08);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
        .app-bar-title{font-family:'Playfair Display',serif;font-size:1.1em;color:var(--gold);letter-spacing:1px;display:flex;align-items:center;gap:8px}
        .btn-back{background:transparent;border:1px solid var(--gold-b);color:var(--gold-l);padding:8px 14px;border-radius:8px;font-size:.85em;cursor:pointer;font-family:'Inter',sans-serif;display:none;align-items:center;gap:6px;transition:all .25s;letter-spacing:.25px}
        .btn-back:hover{background:var(--gold-m)}
        .btn-back.visible{display:flex}

        /* PAGE */
        #page{display:none;min-height:100vh;padding-top:0}
        .section{display:none;max-width:1040px;margin:0 auto;padding:30px 18px 80px;animation:fadeUp .4s ease}
        .section.active{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

        /* HOME DASHBOARD */
        .home-section{padding-top:20px}
        .home-header{text-align:center;margin-bottom:42px;padding-bottom:28px;border-bottom:1px solid rgba(201,168,76,.08)}
        .home-header .icon{font-size:2.5em;margin-bottom:12px;display:block;opacity:.5}
        .home-header h1{font-family:'Playfair Display',serif;font-size:1.8em;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
        .home-header p{color:var(--text-m);font-size:.9em;font-style:italic}

        .home-grid{display:grid;grid-template-columns:1fr;gap:14px}
        @media(min-width:500px){.home-grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:900px){.home-grid{grid-template-columns:repeat(3,1fr)}}

        .home-card{background:var(--bg2);border:1px solid rgba(201,168,76,.08);border-radius:14px;padding:20px 18px;cursor:pointer;transition:all .3s;display:flex;align-items:flex-start;gap:14px}
        .home-card:hover{border-color:var(--gold-b);transform:translateY(-2px)}
        .home-card:active{transform:translateY(0)}
        .home-card.featured{background:linear-gradient(160deg,var(--bg2),rgba(201,168,76,.05))}
        .home-card-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--gold-m),rgba(201,168,76,.02));border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-size:1.5em;flex-shrink:0}
        .home-card-body{flex:1}
        .home-card-body h3{font-family:'Playfair Display',serif;font-size:1em;color:var(--gold-l);margin-bottom:4px}
        .home-card-body p{font-size:.8em;color:var(--text-m);line-height:1.5}
        .home-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
        .home-stat{background:var(--bg2);border:1px solid rgba(201,168,76,.08);border-radius:14px;padding:18px 16px}
        .home-stat-label{display:block;font-size:.72em;letter-spacing:1px;text-transform:uppercase;color:var(--text-d);margin-bottom:6px}
        .home-stat-value{font-family:'JetBrains Mono',monospace;font-size:1.45em;color:var(--gold-l)}

        /* HEADERS */
        .s-head{text-align:center;margin-bottom:46px;padding-bottom:28px;border-bottom:1px solid rgba(201,168,76,.08)}
        .s-head .icon{font-size:2em;margin-bottom:10px;display:block;opacity:.5}
        .s-head h1{font-family:'Playfair Display',serif;font-size:1.7em;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
        .s-head p{color:var(--text-m);font-size:.85em;font-style:italic}

        /* CARDS */
        .card{background:var(--bg2);border:1px solid rgba(201,168,76,.08);border-radius:14px;padding:26px;margin-bottom:20px;position:relative;overflow:hidden;transition:border-color .3s}
        .card:hover{border-color:var(--gold-b)}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-m),transparent)}
        .card h2{font-family:'Playfair Display',serif;font-size:1.18em;color:var(--gold-l);margin-bottom:14px;display:flex;align-items:center;gap:10px}
        .card h2 .num{width:28px;height:28px;border-radius:50%;background:var(--gold-m);border:1px solid var(--gold-b);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.7em;color:var(--gold);flex-shrink:0}
        .card h3{font-size:.95em;color:var(--gold);margin:16px 0 8px}
        .card p{font-size:.88em;color:var(--text);line-height:1.85;margin-bottom:8px}

        .rule-box{background:var(--bg3);border-left:3px solid var(--gold-d);border-radius:0 10px 10px 0;padding:14px 16px;margin:14px 0}
        .rule-box p{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold-l);font-size:.92em;line-height:1.8}

        .table-wrap{overflow-x:auto;margin:14px 0}
        table{width:100%;border-collapse:collapse;font-size:.84em}
        th{text-align:left;padding:10px 12px;background:rgba(201,168,76,.06);color:var(--gold);font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-size:.75em;border-bottom:1px solid var(--gold-m)}
        td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text);vertical-align:top}
        tr:hover td{background:rgba(201,168,76,.02)}

        .do-dont{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
        .do-col,.dont-col{border-radius:10px;padding:14px;font-size:.84em}
        .do-col{background:rgba(46,125,50,.06);border:1px solid rgba(46,125,50,.12)}
        .do-col h4{color:#4CAF50;margin-bottom:8px;font-size:.85em}
        .dont-col{background:var(--red-m);border:1px solid rgba(139,0,0,.15)}
        .dont-col h4{color:#FF5252;margin-bottom:8px;font-size:.85em}
        .do-col li,.dont-col li{margin:4px 0;list-style:none;line-height:1.7;color:var(--text)}
        .do-col li::before{content:'✅ '}
        .dont-col li::before{content:'❌ '}

        .val-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
        .val-item:last-child{border:none}
        .val-icon{font-size:1.3em;min-width:30px;text-align:center}
        .val-text{font-size:.86em;color:var(--text);line-height:1.8}

  /* STATS */
  function countFilled(values) {

  function collectStats() {
    var periods = currentPeriods();
    var records = Object.keys(state.records).sort().map(function (key) {
      return { key: key, record: normalizeRecord(state.records[key], key) };
    }).filter(function (entry) {
      return hasRecordContent(entry.record);
    });

    var weekMap = {};
    var monthMap = {};
    var yearMap = {};
    var notesCount = 0;

    records.forEach(function (entry) {
      var record = entry.record;
      weekMap[record.week] = weekMap[record.week] || { sum: 0, count: 0 };
      monthMap[record.month] = monthMap[record.month] || { sum: 0, count: 0 };
      yearMap[record.year] = yearMap[record.year] || { sum: 0, count: 0 };
      weekMap[record.week].sum += record.percent;
      weekMap[record.week].count += 1;
      monthMap[record.month].sum += record.percent;
      monthMap[record.month].count += 1;
      yearMap[record.year].sum += record.percent;
      yearMap[record.year].count += 1;
      notesCount += countFilled([record.notes.good, record.notes.fail, record.notes.observation]);
    });

    Object.keys(state.reviews.weeks).forEach(function (key) {
      var review = normalizeWeekReview(state.reviews.weeks[key]);
      notesCount += countFilled(review.answers.concat([review.note]));
    });
    Object.keys(state.reviews.months).forEach(function (key) {
      var review = normalizeMonthReview(state.reviews.months[key]);
      notesCount += countFilled([review.wins, review.faults, review.correction, review.focus]);
    });
    Object.keys(state.reviews.years).forEach(function (key) {
      var review = normalizeYearReview(state.reviews.years[key]);
      notesCount += countFilled([review.identity, review.achievements, review.lessons, review.commitment]);
    });

    var MAX_STREAK_DAYS = 3650; // límite defensivo: ~10 años
    var streak = 0;
    var cursor = getToday();
    while (streak < MAX_STREAK_DAYS) {
      var key = dateKey(cursor);
      if (!state.records[key]) break;
      var record = normalizeRecord(state.records[key], key);
      if (!hasRecordContent(record) || record.percent < STREAK_THRESHOLD) break;
      streak += 1;
      cursor.setDate(cursor.getDate() - 1);
    }

    var bestWeekKey = '';
    var bestMonthKey = '';
    var bestWeekValue = -1;
    var bestMonthValue = -1;

    Object.keys(weekMap).forEach(function (key) {
      var value = averageBucket(weekMap[key]);
      if (value > bestWeekValue) {
        bestWeekValue = value;
        bestWeekKey = key;
      }
    });

    Object.keys(monthMap).forEach(function (key) {
      var value = averageBucket(monthMap[key]);
      if (value > bestMonthValue) {
        bestMonthValue = value;
        bestMonthKey = key;
      }
    });

    return {
      todayRecord: getDailyRecord(),
      todayPercent: getDailyRecord().percent,
      streak: streak,
      currentWeekAverage: averageBucket(weekMap[periods.week.key]),
      currentMonthAverage: averageBucket(monthMap[periods.month]),
      currentYearAverage: averageBucket(yearMap[periods.year]),
      bestWeekText: bestWeekKey ? ('Sem ' + Number(bestWeekKey.split('W')[1]) + ' · ' + bestWeekValue + '%') : 'Sin datos',
      bestMonthText: bestMonthKey ? (formatMonthLabel(bestMonthKey) + ' · ' + bestMonthValue + '%') : 'Sin datos',
      totalDays: records.length,
      notesCount: notesCount,
      weekMap: weekMap,
      monthMap: monthMap
    };
  }

  function renderWeeklyChart(stats) {
    var keys = Object.keys(stats.weekMap).sort().slice(-8);
    if (!keys.length) {
      renderEmptyChart(els.weeklyChart, 'Todavía no hay semanas registradas.');
      return;
    }

    var width = 560;
    var height = 250;
    var left = 38;
    var right = 14;
    var top = 16;
    var bottom = 34;
    var plotWidth = width - left - right;
    var plotHeight = height - top - bottom;
    var slot = plotWidth / keys.length;
    var barWidth = Math.min(42, slot * 0.58);
    var svg = [];

    [0, 25, 50, 75, 100].forEach(function (mark) {
      var y = chartY(mark, top, plotHeight);
      svg.push('<line x1="' + left + '" y1="' + y + '" x2="' + (width - right) + '" y2="' + y + '" stroke="rgba(255,255,255,.08)" />');
      svg.push('<text x="' + (left - 8) + '" y="' + (y + 4) + '" text-anchor="end" fill="#666" font-size="10">' + mark + '</text>');
    });

    keys.forEach(function (key, index) {
      var value = averageBucket(stats.weekMap[key]);
      var x = left + slot * index + ((slot - barWidth) / 2);
      var y = chartY(value, top, plotHeight);
      var barHeight = top + plotHeight - y;
      svg.push('<rect x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" rx="8" fill="rgba(201,168,76,.72)" />');
      svg.push('<text x="' + (x + barWidth / 2) + '" y="' + (y - 8) + '" text-anchor="middle" fill="#e5c97b" font-size="11">' + value + '%</text>');
      svg.push('<text x="' + (x + barWidth / 2) + '" y="' + (height - 10) + '" text-anchor="middle" fill="#8a8a8a" font-size="10">S' + Number(key.split('W')[1]) + '</text>');
    });

    els.weeklyChart.innerHTML = '<svg viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Promedio semanal">' + svg.join('') + '</svg>';
  }

  function renderMonthlyChart() {
    var today = getToday();
    var year = today.getFullYear();
    var month = today.getMonth();
    var totalDays = new Date(year, month + 1, 0).getDate();
    var width = 560;
    var height = 250;
    var left = 28;
    var right = 18;
    var top = 18;
    var bottom = 34;
    var plotWidth = width - left - right;
    var plotHeight = height - top - bottom;
    var points = [];
    var circles = [];
    var hasData = false;
    var monthPrefix = year + '-' + pad(month + 1);
    var svg = [];

    [0, 25, 50, 75, 100].forEach(function (mark) {
      var y = chartY(mark, top, plotHeight);
      svg.push('<line x1="' + left + '" y1="' + y + '" x2="' + (width - right) + '" y2="' + y + '" stroke="rgba(255,255,255,.08)" />');
    });

    for (var day = 1; day <= totalDays; day += 1) {
      var key = monthPrefix + '-' + pad(day);
      if (!state.records[key]) continue;
      var record = normalizeRecord(state.records[key], key);
      if (!hasRecordContent(record)) continue;
      hasData = true;
      var x = totalDays === 1 ? left + (plotWidth / 2) : left + ((day - 1) / (totalDays - 1)) * plotWidth;
      var y = chartY(record.percent, top, plotHeight);
      points.push(x + ',' + y);
      circles.push('<circle cx="' + x + '" cy="' + y + '" r="4" fill="#e5c97b" />');
    }

    if (!hasData) {
      renderEmptyChart(els.monthlyChart, 'Todavía no hay días guardados en este mes.');
      return;
    }

    if (points.length > 1) {
      svg.push('<polyline fill="none" stroke="rgba(201,168,76,.9)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="' + points.join(' ') + '" />');
    }
    svg.push(circles.join(''));
    [1, Math.ceil(totalDays / 2), totalDays].forEach(function (day) {
      var x = totalDays === 1 ? left + (plotWidth / 2) : left + ((day - 1) / (totalDays - 1)) * plotWidth;
      svg.push('<text x="' + x + '" y="' + (height - 10) + '" text-anchor="middle" fill="#8a8a8a" font-size="10">' + day + '</text>');
    });

    els.monthlyChart.innerHTML = '<svg viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Progreso mensual">' + svg.join('') + '</svg>';
  }

  function renderYearlyChart(stats) {
    var year = yearKey(getToday());
    var labels = ['E', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D'];
    var values = labels.map(function (_, index) {
      return averageBucket(stats.monthMap[year + '-' + pad(index + 1)]);
    });
    var hasData = labels.some(function (_, index) {
      return !!stats.monthMap[year + '-' + pad(index + 1)];
    });
    if (!hasData) {
      renderEmptyChart(els.yearlyChart, 'Todavía no hay meses completos registrados este año.');
      return;
    }

    var width = 560;
    var height = 250;
    var left = 22;
    var right = 14;
    var top = 16;
    var bottom = 34;
    var plotWidth = width - left - right;
    var plotHeight = height - top - bottom;
    var slot = plotWidth / 12;
    var barWidth = Math.min(26, slot * 0.52);
    var svg = [];

    [0, 25, 50, 75, 100].forEach(function (mark) {
      var y = chartY(mark, top, plotHeight);
      svg.push('<line x1="' + left + '" y1="' + y + '" x2="' + (width - right) + '" y2="' + y + '" stroke="rgba(255,255,255,.08)" />');
    });

    values.forEach(function (value, index) {
      var x = left + slot * index + ((slot - barWidth) / 2);
      var y = chartY(value, top, plotHeight);
      var barHeight = top + plotHeight - y;
      svg.push('<rect x="' + x + '" y="' + y + '" width="' + barWidth + '" height="' + barHeight + '" rx="7" fill="rgba(201,168,76,' + (value ? '.72' : '.12') + ')" />');
      svg.push('<text x="' + (x + barWidth / 2) + '" y="' + (height - 10) + '" text-anchor="middle" fill="#8a8a8a" font-size="10">' + labels[index] + '</text>');
    });

    els.yearlyChart.innerHTML = '<svg viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Resumen anual">' + svg.join('') + '</svg>';
  }

  function renderSummary() {
    var stats = collectStats();
    els.homeTodayPercent.textContent = stats.todayPercent + '%';
    els.homeStreak.textContent = String(stats.streak);
    els.homeWeekAvg.textContent = stats.currentWeekAverage + '%';
    els.homeNotesCount.textContent = String(stats.notesCount);

    els.metricToday.textContent = stats.todayPercent + '%';
    els.metricStreak.textContent = String(stats.streak);
    els.metricWeek.textContent = stats.currentWeekAverage + '%';
    els.metricMonth.textContent = stats.currentMonthAverage + '%';
    els.metricYear.textContent = stats.currentYearAverage + '%';
    els.metricBestWeek.textContent = stats.bestWeekText;
    els.metricBestMonth.textContent = stats.bestMonthText;
    els.metricDays.textContent = String(stats.totalDays);
    els.metricNotes.textContent = String(stats.notesCount);

    updateDailyMeters(stats.todayRecord, stats);
    renderWeeklyChart(stats);
    renderMonthlyChart();
    renderYearlyChart(stats);
  }
  function init() {
    migrateLegacy();
    bindCover();
    bindNavigation();
    bindDaily();
    bindReviews();
    fillDaily();
    fillReviews();
    renderSummary();
  }
  init();
}());
</script>

(function () {

  function openTarget(targetId) {
    if (window.__monolithShowSec) {
      window.__monolithShowSec(targetId || 'sec-home');

  window.monolithNavigate = openTarget;

  document.addEventListener('click', function (event) {

    event.preventDefault();
    var switchView   = link.getAttribute('data-switch-view');
    var switchTarget = link.getAttribute('data-switch-target') || '';
    // Llamada directa: los templates están en la misma ventana, no en iframes
    if (window.__monolithActivateView) {
      window.__monolithActivateView(switchView, { target: switchTarget, updateHash: true });
    }
  });

  window.addEventListener('message', function (event) {

    if (data.type === 'monolith-open' && data.view === 'codigo') {

    }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      openTarget('sec-home');
    }, { once: true });

})();

<div id="sec-codigo" class="section">
    <div class="s-head"><span class="section-kicker">Núcleo Constitucional</span><span class="icon">⚖️</span><h1>Código de Yerikson Varela</h1><p>Las leyes no son decoración. Son la parte del sistema que debe seguir siendo verdad aunque mañana no abras una pantalla.</p></div>
    <div class="card"><h2>Lectura del Núcleo</h2><span class="card-sub">Primero la ley. Después la práctica. Luego la interpretación.</span><p>Esta sección reúne el corazón del documento: las leyes de carácter y las leyes de construcción. Todo lo demás existe para aplicarlas, medirlas, recordarlas o profundizarlas.</p></div>
    <div id="laws-character" class="section-divider"><span class="section-divider-icon">⚔️</span><span class="section-divider-text">Leyes de Carácter</span></div>
<!-- LAS 10 LEYES -->
    <div class="card">
        <h2>Las 12 Leyes del Honor</h2>
        <span class="card-sub">Principios inquebrantables para cada día</span>
    </div>

    <div class="card"><h2><span class="num">1</span>Puntualidad Absoluta</h2><span class="card-sub">"El dominio del tiempo es el dominio de uno mismo"</span><p>Si quedas a una hora, llegas 10 minutos antes. Siempre. Sin excusas. Llegar tarde es decirle al otro que su tiempo no vale. Si vas a retrasarte, avisas antes de la hora, nunca después.</p><div class="rule-box"><p>"Mi puntualidad es la primera muestra de respeto. Si no respeto el tiempo del otro, no merezco su presencia."</p></div></div>

    <div class="card"><h2><span class="num">2</span>Cuidado Personal</h2><span class="card-sub">"Presentarse limpio y ordenado es honrar a quien te recibe"</span><p>Cada vez que te presentes ante alguien importante, hazlo limpio, arreglado y presentable. No se trata de ropa cara sino de respeto. Baño, ropa limpia, uñas cortadas, cabello ordenado. Sin negociación.</p><div class="rule-box"><p>"Me arreglo porque valoro a quien tengo enfrente. No es vanidad, es disciplina."</p></div></div>

    <div class="card"><h2><span class="num">3</span>Consideración Constante</h2><span class="card-sub">"Antes de actuar, piensa en cómo afecta al otro"</span><p>Anticipa las necesidades de los demás. No esperes a que te pidan ayuda. No esperes a que te digan qué les molesta. Observa, piensa, actúa. La consideración silenciosa vale más que mil palabras.</p><div class="rule-box"><p>"No necesito que me pidan las cosas. Me anticipo porque me importa."</p></div></div>

    <div class="card"><h2><span class="num">4</span>Leer el Ambiente</h2><span class="card-sub">"Los ojos hablan más que las palabras"</span><p>Aprende a percibir el estado emocional de quienes te rodean sin que te lo digan. Si alguien está callado, distingue si está cansado, molesto o tranquilo. Esta habilidad es la forma más alta de inteligencia emocional.</p><div class="rule-box"><p>"Escucho lo que no se dice. Observo lo que no se muestra. Entiendo lo que no se explica."</p></div></div>

    <div class="card"><h2><span class="num">5</span>Cada Momento es Único</h2><span class="card-sub">"Este instante no se repetirá jamás"</span><p>Cada conversación, cada encuentro, cada rato compartido es irrepetible. No mires el teléfono cuando alguien te habla. No pienses en lo que viene después. Vive el ahora con intensidad total.</p><div class="rule-box"><p>"Este momento no volverá. Lo vivo con todo lo que tengo."</p></div></div>

    <div class="card"><h2><span class="num">6</span>Paciencia Inquebrantable</h2><span class="card-sub">"La resistencia silenciosa forja el carácter"</span><p>No te apresures. No te frustres. No te rindas. Las cosas buenas toman tiempo. Si hoy no se dio, mañana será otro día. La paciencia no es esperar sin hacer nada, es seguir construyendo mientras el momento llega.</p><div class="rule-box"><p>"La paciencia no es debilidad. Es la fuerza de quien sabe que su momento llegará."</p></div></div>

    <div class="card"><h2><span class="num">7</span>Honestidad Total</h2><span class="card-sub">"La verdad es el cimiento de todo lo que construyas"</span><p>Sé siempre honesto. Ni mentiras pequeñas ni grandes. No aparentes ser algo que no eres. Si prometiste algo, cúmplelo. Si te equivocaste, admítelo. Tu palabra es tu honor.</p><div class="rule-box"><p>"Prefiero una verdad incómoda que una mentira cómoda. Mi palabra vale oro."</p></div></div>

    <div class="card"><h2><span class="num">8</span>Gratitud Permanente</h2><span class="card-sub">"Nada es obligación de nadie. Todo es un regalo"</span><p>Agradece cada gesto, cada comida, cada momento compartido. No des nada por hecho. La persona que cocina para ti, que te escucha, que te abre su puerta no tiene que hacerlo. Valora cada acto con palabras y acciones.</p><div class="rule-box"><p>"Todo lo que recibo es un regalo que no merezco pero que valoro con el alma."</p></div></div>

    <div class="card"><h2><span class="num">9</span>Autocontrol Total</h2><span class="card-sub">"La verdadera fuerza se mide en la calma, no en el grito"</span><p>Controla tus emociones. No explotes. No hagas escenas. No levantes la voz. Si sientes celos, respira y piensa antes de actuar. Si algo te molesta, procésalo internamente antes de expresarlo. La calma es poder.</p><div class="rule-box"><p>"Mi fuerza no se mide por cuánto grito, sino por cuánto me controlo cuando quiero gritar."</p></div></div>

    <div class="card"><h2><span class="num">10</span>Acciones Sobre Palabras</h2><span class="card-sub">"El amor, el respeto y el compromiso se demuestran haciendo"</span><p>Cualquiera dice cosas bonitas. La diferencia está en quien las respalda con hechos. No digas "me importas" si no lo demuestras. No digas "te apoyo" si no estás presente. Las palabras sin acciones son ruido vacío.</p><div class="rule-box"><p>"Cualquiera habla. Yo demuestro. Mis acciones son mi idioma."</p></div></div>

    <div class="card"><h2><span class="num">11</span>Presencia Sobre Pantalla</h2><span class="card-sub">"Si puedes estar ahí, estar ahí vale más que cualquier mensaje"</span><p>Las relaciones se construyen mirándose a los ojos, compartiendo tiempo, sosteniendo silencios y apareciendo cuando importa. La pantalla sirve, pero nunca debe reemplazar lo presencial cuando lo presencial es posible.</p><div class="rule-box"><p>"No me escondo detrás de una pantalla. Si puedo estar ahí, estoy ahí."</p></div></div>

    <div class="card"><h2><span class="num">12</span>Coraje con Calma</h2><span class="card-sub">"La valentía limpia no hace drama, pero tampoco se esconde"</span><p>El miedo no desaparece solo porque esperes más. Hay momentos en los que la calma debe caminar junto al coraje. No se trata de actuar por impulso, sino de dar el paso cuando ya existe claridad suficiente.</p><div class="rule-box"><p>"La valentía no es ausencia de miedo. Es actuar con calma cuando ya no hay excusa digna para seguir postergando."</p></div></div>
    <div id="laws-build" class="section-divider"><span class="section-divider-icon">🏛️</span><span class="section-divider-text">Leyes de Construcción</span></div>
<div class="card">
        <h2>Hacer y Construir</h2>
        <p>Hacer puede ser cumplir una tarea. Construir es dejar algo mejor, más firme y más útil de como estaba antes. Hacer termina cuando acabas. Construir sigue hablando de ti incluso después.</p>
        <div class="rule-box"><p>"No quiero solo terminar cosas. Quiero levantar cosas que valgan la pena."</p></div>
    </div>

    <div class="card">
        <h2>La Calidad como Respeto</h2>
        <p>La calidad no es lujo ni adorno. Es respeto hacia quien va a usar lo que haces, hacia el tiempo invertido y hacia tu propio nombre. Cuando entregas algo descuidado, también entregas una versión descuidada de ti.</p>
        <div class="rule-box"><p>"La calidad es respeto visible."</p></div>
    </div>

    <div class="card">
        <h2>La Responsabilidad de Saber Crear</h2>
        <p>Si sabes construir, tienes una obligación mayor que quien solo consume. Tu capacidad no existe para alimentar ego, sino para resolver, sostener y abrir caminos. El talento sin servicio se vuelve estéril.</p>
        <div class="rule-box"><p>"Si sé crear, tengo el deber de crear con responsabilidad."</p></div>
    </div>

    <div class="card">
        <h2>Silencio y Dignidad al Mostrar</h2>
        <p>Construir en silencio fortalece el fondo. Pero mostrar con dignidad permite que la obra cumpla su función y encuentre a quien le sirve. Presumir es inflarte. Mostrar con honor es dejar que la verdad respire.</p>
        <div class="rule-box"><p>"No hago ruido para parecer grande. Muestro lo verdadero para que no se pierda."</p></div>
    </div>

    <div class="card">
        <h2>La Obra como Espejo</h2>
        <p>Todo lo que haces termina revelándote: tu nivel de paciencia, tu limpieza mental, tu seriedad, tu respeto por el detalle y tu forma de responder a la realidad. La obra no miente. Por eso también educa a su creador.</p>
        <div class="rule-box"><p>"Mi obra termina diciendo quién soy, incluso cuando yo no hablo."</p></div>
    </div>

                <p style="font-size:.88em;color:var(--text);line-height:1.85;margin-bottom:14px">La presencia no depende del lujo. Depende del respeto. Cada vez que te presentas ante alguien, ante un lugar o ante una situación que lo merece, llegas con cuidado. No con ropa cara. No con perfección. Con cuidado. Trabajo de campo, ropa de trabajo, urgencias reales: ninguno cancela la dignidad. La cancelan el descuido habitual, la flojera disfrazada de comodidad y el abandono personal que ya no incomoda.</p>

<!-- ==================== PROHIBICIONES ==================== -->
<div id="sec-prohibitions" class="section" role="tabpanel">
    <div class="s-head">
        <span class="icon">🚫</span>
        <h1>Prohibiciones</h1>
        <p>Reglas que un hombre de honor no negocia</p>
    </div>

    <div class="card">
        <h2>Lo que no hacer</h2>
        <span class="card-sub">Prohibiciones que un hombre de honor no negocia</span>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Mentir.</strong> Ni por conveniencia, ni por comodidad, ni para quedar bien. La mentira destruye la confianza de raíz.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Manipular.</strong> No uses información, emociones ni silencios como instrumentos de control.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Hablar de más.</strong> No todo lo que piensas debe decirse. No toda reunión necesita tu opinión.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Humillarte por atención.</strong> No cambies quién eres para que alguien te note. Eso no es conexión, es actuación.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Rogar amor o validación.</strong> Tu valor no depende de cuánto te aprueben. Quien tiene que verlo lo verá sin que lo supliques.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Competir por la atención de alguien contra personas que no saben que compites.</strong> Crear una rivalidad mental con quien solo ocupa su lugar natural es degradarte.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Sentir celos de un familiar o amigo que cumple su rol natural.</strong> No todo vínculo ajeno te desplaza. Cada relación tiene su lugar.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Construir narrativas de rechazo basadas en suposiciones sin pruebas.</strong> Lo que imaginas con miedo no se vuelve verdad por repetirlo mucho.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Dejar que tu paz dependa del tiempo de respuesta de otra persona.</strong> Si un silencio ajeno decide tu valor, aún no estás sosteniendo tu centro.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Confundir observación con vigilancia emocional.</strong> Observar aclara. Vigilar te obsesiona, te deforma y te vuelve esclavo de una narrativa.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Actuar por impulso.</strong> Las decisiones tomadas desde la rabia, el miedo o la euforia suelen salir caras.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Perder tiempo en vicios.</strong> Nada que te embote, te degrade o te haga perder el control tiene cabida aquí.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Prometer lo que no cumplirás.</strong> Cada promesa rota es una deuda de carácter que pagas con reputación.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Entregar algo sin alma por cumplir un plazo.</strong> La prisa puede explicar un límite, pero nunca justificar una obra vacía.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Inflar resultados para impresionar.</strong> Lo falso puede impresionar un rato, pero degrada el nombre de quien lo firma.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Copiar sin entender ni hacer propio.</strong> Repetir una forma sin fondo no es construir: es disfrazarte de alguien que no eres.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Construir solo para ti cuando puedes construir para otros.</strong> Si tienes la capacidad de abrir refugio, encerrarte por puro ego es una falta.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Traicionar tus principios.</strong> Ni por dinero, ni por presión social, ni por comodidad momentánea.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Descuidar cuerpo y mente.</strong> Lo que no cuidas se deteriora. Descanso, higiene, salud y claridad mental no son opcionales.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Responder con desesperación.</strong> Cuando sientas urgencia de reaccionar, espera. Casi siempre ese impulso es un error.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Buscar aprobación de cualquiera.</strong> No todo el mundo tiene autoridad moral para juzgarte. Elige a quiénes escuchas.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Caer en chismes.</strong> Si no lo dices frente a quien se trata, no lo digas. Punto.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Ser desordenado.</strong> El desorden en los espacios es desorden en la vida. No es comodidad, es negligencia.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Justificar la debilidad voluntaria.</strong> Hay situaciones difíciles. Pero si fallaste porque no quisiste esforzarte, eso no tiene excusa.</span></div>
        <div class="val-item"><span class="val-icon">❌</span><span class="val-text"><strong>Abandonar el propósito.</strong> Los momentos de duda no son una señal para rendirse. Son una prueba del camino.</span></div>
    </div>
</div>
<!-- ==================== LO QUE SÍ HACER ==================== -->
<div id="sec-si" class="section" role="tabpanel">
    <div class="s-head">
        <span class="icon">✅</span>
        <h1>Lo que sí hacer</h1>
        <p>Acciones que construyen tu carácter</p>
    </div>

    <div class="card">
        <h2>Compromisos diarios</h2>
        <span class="card-sub">Un hombre de honor hace esto cada día</span>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Decir siempre la verdad.</strong> Aunque incomode. La honestidad es la base de toda credibilidad.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Cumplir la palabra dada.</strong> Si lo dices, lo haces. Sin excepciones.</span></div>

        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Cuidar la presencia física.</strong> Limpio, ordenado y presentable. Siempre. No por vanidad, sino por respeto.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Actuar con disciplina.</strong> Hacer lo que toca aunque no se tenga ganas. El carácter se construye en los días grises.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Mantener el autocontrol.</strong> Calma bajo presión. Pensar antes de hablar. Nunca actuar desde el impulso.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Estudiar y crecer sin parar.</strong> Leer, aprender, mejorar. La ignorancia nunca es excusa.</span></div>

        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Mostrar tu trabajo sin vergüenza pero sin arrogancia.</strong> La obra honesta merece luz, no espectáculo.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Construir con la intención de que otros se beneficien.</strong> La utilidad humana eleva el valor de cualquier esfuerzo.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Dejar la obra mejor de como la encontraste.</strong> Cada intervención tuya debe elevar, no empobrecer.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Construir seguridad basada en tu valor real, no en validación externa.</strong> Tu centro no puede depender de una respuesta, de una ausencia ni de una comparación.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Distinguir entre análisis real y tortura mental disfrazada de reflexión.</strong> Si pensar te da más ansiedad que claridad, no estás analizando: te estás hiriendo.</span></div>

        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Responder al silencio con dignidad, no con ansiedad.</strong> No rellenes el vacío con miedo. Espera, observa y actúa solo desde calma.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Preguntarte si lo que sientes tiene pruebas o solo tiene miedo detrás.</strong> La honestidad contigo mismo empieza por separar hecho, interpretación y herida.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Escuchar más, hablar con intención.</strong> Cada palabra que dices debe tener peso. El silencio también comunica.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Respetar a todos.</strong> A los mayores, a los iguales, a quienes tienen menos. El respeto no es selectivo.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Mantener el orden.</strong> En tu cuarto, en tu mente, en tu agenda. El orden externo refleja el orden interno.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Actuar con calma.</strong> La serenidad es una herramienta, no una debilidad. Las mejores decisiones se toman en frío.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Honrar a la familia.</strong> Los que te criaron merecen gratitud, presencia y respeto. No lo des por hecho.</span></div>
        <div class="val-item"><span class="val-icon">✔️</span><span class="val-text"><strong>Proteger tu reputación.</strong> Lo que haces cuando nadie mira define quién eres realmente.</span></div>

        <h2>Trampas Mentales</h2>
        <span class="card-sub">Hay errores que parecen prudencia, pero en realidad son miedo disfrazado.</span>
        <div class="val-item"><span class="val-icon">🕸️</span><span class="val-text"><strong>Sobreanálisis.</strong> Pensar demasiado una acción sencilla hasta volverla imposible.</span></div>
        <div class="val-item"><span class="val-icon">🧱</span><span class="val-text"><strong>Perfeccionismo.</strong> Esperar el momento ideal como excusa para no exponerte nunca.</span></div>
        <div class="val-item"><span class="val-icon">📱</span><span class="val-text"><strong>Dependencia del teléfono.</strong> Buscar claridad en una pantalla cuando la respuesta está en presentarte en persona.</span></div>
        <div class="val-item"><span class="val-icon">⏳</span><span class="val-text"><strong>Espera pasiva.</strong> Llamar paciencia a quedarte quieto por miedo a actuar.</span></div>
        <div class="val-item"><span class="val-icon">👁️</span><span class="val-text"><strong>El visto como ilusión.</strong> Un doble check no es una biografía, ni un juicio, ni una verdad completa.</span></div>
        <div class="val-item"><span class="val-icon">🎭</span><span class="val-text"><strong>Autoengaño elegante.</strong> Decirte "estoy siendo estratégico" cuando en realidad estás evitando el riesgo.</span></div>
        <div class="val-item"><span class="val-icon">👥</span><span class="val-text"><strong>La competencia fantasma.</strong> Crear un rival donde no existe. Sentir que alguien te roba atención cuando simplemente ocupa un rol distinto en la vida de esa persona. Cada quien tiene su lugar y el tuyo no depende de la ausencia de otros.</span></div>
        <div class="val-item"><span class="val-icon">🩶</span><span class="val-text"><strong>Celos disfrazados de observación.</strong> Decir "estoy analizando" cuando en realidad alimentas inseguridad. El análisis te da calma; los celos te dejan ansiedad. Si pensar te empeora, no estabas analizando: te estabas torturando.</span></div>
        <div class="val-item"><span class="val-icon">🧠</span><span class="val-text"><strong>La narrativa inventada.</strong> Construir una historia completa con información incompleta. Suponer rechazo, reemplazo o pérdida de lugar sin pruebas solo porque tu miedo llenó los huecos.</span></div>
        <div class="val-item"><span class="val-icon">⚠️</span><span class="val-text"><strong>La urgencia artificial.</strong> Sentir que si no actúas ahora todo se pierde. Si mañana todo sigue igual, no era urgencia real: era ansiedad pidiendo protagonismo.</span></div>
        <div class="val-item"><span class="val-icon">🎯</span><span class="val-text"><strong>El protagonismo como necesidad.</strong> Querer ser el centro de atención de alguien para sentirte valioso. La seguridad real no necesita que todos los demás se aparten.</span></div>
        <div class="val-item"><span class="val-icon">⚖️</span><span class="val-text"><strong>La comparación destructiva.</strong> Medirte restándole valor a quienes rodean a la persona que te importa. Tu valor no crece empequeñeciendo el de otros.</span></div>
        <div class="rule-box"><p>"Si una idea te inmoviliza, no te está protegiendo: te está encerrando."</p></div>
    </div>

    <div id="psi-seguridad" class="card">
        <h2>Seguridad Interna</h2>
        <span class="card-sub">La calma verdadera no nace de que te elijan. Nace de saber quién eres aunque nadie te esté validando hoy.</span>
        <div class="rule-box"><p>"La seguridad no viene de que los demás te elijan. Viene de saber quién eres aunque nadie te elija. Si necesitas la validación constante de otra persona para sentirte valioso, cualquier silencio te destruye."</p></div>
        <div class="val-item"><span class="val-icon">📩</span><span class="val-text"><strong>Tu valor no fluctúa con un visto.</strong> Lo que vales no sube cuando te responden rápido ni baja cuando tardan. Tu valor está en lo que construyes, en cómo tratas a los demás y en la disciplina con la que vives.</span></div>
        <div class="val-item"><span class="val-icon">🪨</span><span class="val-text"><strong>Tu lugar no depende de la ausencia de otros.</strong> Si necesitas que todos desaparezcan para brillar, tu luz aún no es firme. El hombre seguro sostiene su lugar con o sin público.</span></div>
        <div class="val-item"><span class="val-icon">⏳</span><span class="val-text"><strong>La paciencia del seguro vs la ansiedad del inseguro.</strong> El seguro espera con calma porque sabe lo que vale. El inseguro espera con ansiedad porque necesita confirmación. La diferencia no está en la espera, sino en lo que sientes dentro de ella.</span></div>
        <div class="val-item"><span class="val-icon">🫱</span><span class="val-text"><strong>No confundas presencia con posesión.</strong> Querer estar presente en la vida de alguien es sano. Necesitar controlar quién más está presente es tóxico. Tu lugar se gana con valor, no se defiende con celos.</span></div>
        <div class="val-item"><span class="val-icon">🌫️</span><span class="val-text"><strong>El silencio no es rechazo.</strong> Que alguien no escriba hoy no significa que ya no le importes. A veces el silencio es solo silencio, no un mensaje secreto contra ti.</span></div>
        <div class="rule-box"><p>"La paz prestada por la validación se cae con el primer silencio."</p></div>
    </div>

    <div id="psi-principios" class="card">
        <h2>Principios Estratégicos</h2>
        <span class="card-sub">La estrategia sana no manipula: ordena tu energía para actuar mejor.</span>
        <div class="table-wrap"><table>
            <tr><th>Principio</th><th>Qué exige</th><th>Aplicación real</th></tr>
            <tr><td>Acción mínima efectiva</td><td>Dejar de complicar lo simple</td><td>A veces el paso correcto es subir la cuesta y aparecer, no redactar otro mensaje.</td></tr>
            <tr><td>Presencia sobre pantalla</td><td>Elegir el canal más humano</td><td>Si puedes estar ahí, estar ahí vale más que cualquier texto bien escrito.</td></tr>
            <tr><td>Lectura inversa</td><td>Usar el canal que la otra persona sí abre</td><td>Si en persona es cálida y por chat no, deja de medir todo por mensajes.</td></tr>
            <tr><td>No persecución</td><td>Dignidad sin pasividad</td><td>No ruegas atención, pero tampoco escondes tu valor en silencio eterno.</td></tr>
            <tr><td>Calibración</td><td>Hablar el idioma emocional del otro</td><td>No todos necesitan lo mismo para sentirse escuchados, tranquilos o valorados.</td></tr>
            <tr><td>El momento</td><td>Actuar sin teatro ni demora cobarde</td><td>El mejor momento no es perfecto: es suficientemente limpio, claro y real.</td></tr>
        </table></div>
        <div class="rule-box"><p>"La mejor estrategia no es la más compleja. Es la que te hace actuar mejor y a tiempo."</p></div>
    </div>

    <div id="psi-idiomas" class="card">
        <h2>Idiomas Emocionales</h2>
        <span class="card-sub">Adaptarte no es perderte. Es respetar cómo el otro recibe mejor la verdad.</span>
        <div class="table-wrap"><table>
            <tr><th>Tipo de persona</th><th>Qué valora</th><th>Cómo acercarte sin perder esencia</th></tr>
            <tr><td>Reservada</td><td>Calma, espacio y seguridad</td><td>Habla claro, sin invadir. Demuestra constancia con serenidad.</td></tr>
            <tr><td>Directa</td><td>Verdad sin rodeos</td><td>Di lo que sientes con respeto, sin discursos interminables.</td></tr>
            <tr><td>Emocional</td><td>Tono, atención y presencia</td><td>No respondas como máquina. Mira, escucha y valida sin exagerar.</td></tr>
            <tr><td>Práctica</td><td>Hechos, soluciones y orden</td><td>Menos promesas, más acciones concretas y seguimiento real.</td></tr>
            <tr><td>Espontánea</td><td>Vida, calor y movimiento</td><td>No intentes controlar todo. Deja espacio a lo vivo y al momento.</td></tr>
        </table></div>
        <div class="rule-box"><p>"No todos aman igual, no todos expresan igual, no todos escuchan igual. El criterio está en notar eso a tiempo."</p></div>
    </div>

    <div id="psi-error" class="card">
        <h2>Error, Corrección y Reparación</h2>
        <span class="card-sub">El error no define. La respuesta al error, sí. Corregir rápido, sin excusas, con hechos: eso es lo que sostiene el carácter.</span>

        <div class="val-item"><span class="val-icon">🔍</span><span class="val-text"><strong>Reconocer sin excusas.</strong> Ver el fallo con claridad, sin maquillarlo ni exagerarlo. El diagnóstico honesto es el primer acto de responsabilidad.</span></div>
        <div class="val-item"><span class="val-icon">⚖️</span><span class="val-text"><strong>Separar culpa de responsabilidad.</strong> La culpa es parálisis. La responsabilidad es acción. Uno destruye; el otro construye.</span></div>
        <div class="val-item"><span class="val-icon">🛠️</span><span class="val-text"><strong>Corregir con hechos, no con palabras.</strong> Las explicaciones tienen su lugar. Pero lo que repara es la acción concreta, visible y sostenida en el tiempo.</span></div>
        <div class="val-item"><span class="val-icon">🔄</span><span class="val-text"><strong>Revisar el patrón, no solo el hecho.</strong> Si el mismo error aparece de nuevo, no es un accidente; es una señal de algo estructural. Hay que ver qué hábito, creencia o contexto lo genera.</span></div>
        <div class="val-item"><span class="val-icon">⚡</span><span class="val-text"><strong>Volver al centro rápido.</strong> Caer no es el problema. Quedarse en el suelo sí. La velocidad de recuperación es una medida real del carácter.</span></div>
        <div class="val-item"><span class="val-icon">🚫</span><span class="val-text"><strong>No victimizarse.</strong> Convertir el error en historia de sufrimiento es otra forma de no corregir. El victimismo bloquea la reparación.</span></div>
        <div class="val-item"><span class="val-icon">🤝</span><span class="val-text"><strong>Reparar con hechos cuando hay daño a otros.</strong> Si el error afectó a alguien, la reparación es concreta: una acción real, no solo una disculpa. Las palabras abren la puerta; los hechos la sostienen.</span></div>

        <div class="rule-box"><p>"El error es información. La excusa es ruido."</p></div>

        <h3 style="margin: 20px 0 10px; font-size: 0.88rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold); opacity: 0.8;">Protocolos de corrección</h3>

        <div class="val-item"><span class="val-icon">📋</span><span class="val-text"><strong>Protocolo de revisión de fallo.</strong> Cuando algo salió mal: (1) Identificar qué pasó exactamente. (2) Ver qué decidí o no decidí que lo causó. (3) Determinar qué cambio concreto evita que se repita. (4) Ejecutar ese cambio. Sin drama, sin excusas.</span></div>
        <div class="val-item"><span class="val-icon">✂️</span><span class="val-text"><strong>Separación culpa/responsabilidad.</strong> Pregunta de corte: ¿Esto que siento me mueve hacia la acción o me paraliza? Si paraliza, es culpa. Si moviliza, es responsabilidad. Actuar desde la segunda.</span></div>
        <div class="val-item"><span class="val-icon">🧭</span><span class="val-text"><strong>Retorno al centro.</strong> Después de un fallo importante: 24 horas máximo para procesar. Luego: acción. No más análisis sin movimiento. El rumiar sin acción solo profundiza el hoyo.</span></div>
        <div class="val-item"><span class="val-icon">🔎</span><span class="val-text"><strong>Filtro de justificación.</strong> Antes de explicar un error a alguien: ¿Esta explicación sirve para reparar o solo para defenderme? Si solo es defensa, mejor callar y actuar.</span></div>
    </div>
</div>
<!-- ==================== FILOSOFÍA PROFUNDA ==================== -->
<div id="sec-filosofia" class="section" role="tabpanel">
    <div class="s-head">
        <span class="section-kicker">Fondo del carácter</span>
        <span class="icon">💎</span>
        <h1>Filosofía Profunda</h1>
        <p>Reflexiones para no confundir método con rigidez, ni paciencia con miedo, ni preparación con fuga.</p>
    </div>

    <div class="card inline-map">
        <h2>Mapa Filosófico</h2>
        <span class="card-sub">Base conceptual primero; luego las dos figuras que organizan el criterio</span>
        <div class="chapter-grid">
            <a class="chapter-link" href="#filo-base"><small>Base</small><strong>Fondo Filosófico</strong><span>Paciencia, presencia, método, espontaneidad y coraje silencioso.</span></a>
            <a class="chapter-link" href="#filo-hombre"><small>Figura</small><strong>El Hombre Seguro</strong><span>Seguridad interna, celos, rival imaginario y presencia sin posesión.</span></a>
            <a class="chapter-link" href="#filo-constructor"><small>Figura</small><strong>El Constructor</strong><span>Calidad, responsabilidad y obra como espejo del carácter.</span></a>
        </div>
    </div>

    <div id="filo-base" class="card">
        <h2>Paciencia y Cobardía</h2>
        <p>La paciencia prepara, observa y actúa cuando el momento lo pide. La cobardía, en cambio, se esconde detrás de frases nobles para no arriesgar nada. Desde fuera pueden parecer iguales. Por dentro son opuestas.</p>
        <p>Si ya viste la puerta, si ya tienes claridad, si ya sabes lo que sientes y lo que quieres decir, seguir posponiendo no siempre es prudencia. A veces es miedo vestido de elegancia.</p>
        <div class="rule-box"><p>"La paciencia espera con trabajo. La cobardía espera para no moverse."</p></div>
    </div>

    <div class="card">
        <h2>Construir y Mostrar</h2>
        <p>Construir en silencio es noble. Pero esconderte para siempre también puede ser una forma de orgullo, temor o rigidez. De nada sirve levantar una catedral si nadie sabe que existe, nadie puede entrar y nadie recibe su refugio.</p>
        <p>Mostrar no es presumir. Mostrar es permitir que lo real se vea: tu carácter, tu trabajo, tu interés, tu presencia. Lo importante es que lo mostrado esté respaldado por fondo.</p>
        <div class="rule-box"><p>"No te vendas como algo que no eres. Pero tampoco escondas lo bueno que sí construiste."</p></div>
    </div>

    <div class="card">
        <h2>Preparación y Parálisis</h2>
        <p>Prepararte es correcto. Te limpia, te ordena y te da fondo. Pero cuando la preparación se vuelve eterna, deja de ser disciplina y se convierte en una frontera cómoda para no sentir riesgo.</p>
        <p>Llega un punto en el que ya no necesitas otra semana, otro discurso mental ni otro borrador. Necesitas dar el paso. No perfecto. No teatral. Solo real.</p>
        <div class="rule-box"><p>"Prepararte sirve hasta que ya estás listo. Después de eso, seguir preparando es huida."</p></div>
    </div>

    <div class="card">
        <h2>Presencia como Lenguaje</h2>
        <p>Tu cuerpo ahí, tu tiempo entregado, tus ojos atentos y tu calma al hablar comunican más que cualquier texto largo. La presencia bien usada no necesita adornos porque ya es una forma de verdad.</p>
        <p>Por eso una visita breve, una subida a la casa, una conversación mirando a los ojos o una ayuda concreta pueden pesar más que muchos días de pantalla.</p>
        <div class="rule-box"><p>"La presencia no explica tanto. Demuestra."</p></div>
    </div>

    <div class="card">
        <h2>Coraje Silencioso</h2>
        <p>El coraje serio no hace drama. No golpea la mesa. No necesita ruido. Es la fuerza de tocar la puerta cuando todo dentro de ti quiere dejarlo para mañana. Es hablar con calma cuando sería más fácil seguir escondido.</p>
        <p>El valor más alto no siempre se ve como intensidad. A veces se ve como una voz estable, una decisión limpia y un paso dado a tiempo.</p>
        <div class="rule-box"><p>"El coraje más limpio no grita. Avanza."</p></div>
    </div>

    <div class="card">
        <h2>Método, Espontaneidad y Fusión</h2>
        <p>El método te da estructura. El fuego te da motor. La espontaneidad te da vida. Si solo tienes método, te vuelves rígido. Si solo tienes fuego, te vuelves impulsivo. Si solo fluyes, te dispersas.</p>
        <p>La madurez está en unir disciplina oriental, fuego latino y raíces propias sin actuar como copia de nadie. Tu forma correcta no es la más fría ni la más intensa. Es la más verdadera, limpia y sostenida.</p>
        <div class="rule-box"><p>"Mi estructura me sostiene. Mi fuego me mueve. Mi verdad decide cuándo actuar."</p></div>
    </div>

    <div id="filo-hombre" class="section-divider">
        <span class="section-divider-icon">🛡️</span>
        <span class="section-divider-text">El Hombre Seguro</span>
    </div>

    <div class="card">
        <h2>La Seguridad se Construye por Dentro</h2>
        <p>Ninguna persona, ningún logro y ninguna validación externa puede darte una seguridad que no has construido internamente. Si dependes de que alguien te responda para estar en paz, tu paz no es tuya: es prestada.</p>
        <div class="rule-box"><p>"La seguridad prestada por otros siempre vence sin avisar."</p></div>
    </div>

    <div class="card">
        <h2>Celos y Amor no son lo Mismo</h2>
        <p>Los celos no son prueba de amor. Son prueba de inseguridad. El amor confía, observa con calma y da espacio. Los celos vigilan, controlan y ahogan. Confundir una cosa con la otra solo ensucia lo que dices sentir.</p>
        <div class="rule-box"><p>"Los celos no cuidan lo valioso. Lo aprietan hasta dañarlo."</p></div>
    </div>

    <div class="card">
        <h2>El Rival que no Existe</h2>
        <p>La mayoría de rivales que inventamos en la mente no saben que los consideramos rivales. Mientras tú sufres comparándote, el otro solo vive su vida. La competencia que más te deforma suele ser la que existe solo en tu cabeza.</p>
        <div class="rule-box"><p>"El rival imaginario te desgasta más que cualquier rival real."</p></div>
    </div>

    <div class="card">
        <h2>Presencia sin Posesión</h2>
        <p>Estar presente sin asfixiar, cuidar sin controlar y amar sin poseer es una de las formas más altas de madurez. La presencia limpia acompaña. La posesión invade. Lo primero construye vínculo. Lo segundo lo enferma.</p>
        <div class="rule-box"><p>"Quien necesita controlar todo lo que rodea a alguien aún no sabe estar cerca de verdad."</p></div>
    </div>

    <div class="card">
        <h2>La Prueba del Espejo</h2>
        <p>Antes de reaccionar ante algo que te molesta, párate frente al espejo y pregúntate si eso que sientes es real o inventado. Si tienes pruebas o solo suposiciones. Si actuar ahora te acerca a lo que quieres o solo descarga ansiedad.</p>
        <div class="rule-box"><p>"Si no puedes responder con calma, todavía no estás listo para actuar."</p></div>
    </div>

    <div id="filo-constructor" class="section-divider">
        <span class="section-divider-icon">🏛️</span>
        <span class="section-divider-text">El Constructor</span>
    </div>

    <div class="card">
        <h2>Hacer y Construir</h2>
        <p>Hacer puede ser cumplir una tarea. Construir es dejar algo mejor, más firme y más útil de como estaba antes. Hacer termina cuando acabas. Construir sigue hablando de ti incluso después.</p>
        <div class="rule-box"><p>"No quiero solo terminar cosas. Quiero levantar cosas que valgan la pena."</p></div>
    </div>

    <div class="card">
        <h2>La Calidad como Respeto</h2>
        <p>La calidad no es lujo ni adorno. Es respeto hacia quien va a usar lo que haces, hacia el tiempo invertido y hacia tu propio nombre. Cuando entregas algo descuidado, también entregas una versión descuidada de ti.</p>
        <div class="rule-box"><p>"La calidad es respeto visible."</p></div>
    </div>

    <div class="card">
        <h2>La Responsabilidad de Saber Crear</h2>
        <p>Si sabes construir, tienes una obligación mayor que quien solo consume. Tu capacidad no existe para alimentar ego, sino para resolver, sostener y abrir caminos. El talento sin servicio se vuelve estéril.</p>
        <div class="rule-box"><p>"Si sé crear, tengo el deber de crear con responsabilidad."</p></div>
    </div>

    <div class="card">
        <h2>Silencio y Dignidad al Mostrar</h2>
        <p>Construir en silencio fortalece el fondo. Pero mostrar con dignidad permite que la obra cumpla su función y encuentre a quien le sirve. Presumir es inflarte. Mostrar con honor es dejar que la verdad respire.</p>
        <div class="rule-box"><p>"No hago ruido para parecer grande. Muestro lo verdadero para que no se pierda."</p></div>
    </div>

    <div class="card">
        <h2>La Obra como Espejo</h2>
        <p>Todo lo que haces termina revelándote: tu nivel de paciencia, tu limpieza mental, tu seriedad, tu respeto por el detalle y tu forma de responder a la realidad. La obra no miente. Por eso también educa a su creador.</p>
        <div class="rule-box"><p>"Mi obra termina diciendo quién soy, incluso cuando yo no hablo."</p></div>
    </div>
</div>
<!-- ==================== PERFIL MAESTRO ==================== -->
<div id="sec-perfil" class="section" role="tabpanel">
    <div class="s-head">
        <span class="section-kicker">Quién Soy</span>
        <span class="icon">🏛️</span>
        <h1>Perfil Maestro</h1>
        <p>No es biografía. Es claridad sobre el tipo de constructor que soy para no perder el norte.</p>
    </div>

    <div class="card">
        <h2>Declaración de Identidad</h2>
        <span class="card-sub">Estos rasgos no son adorno. Son el criterio con el que debo juzgar mi trabajo y mi conducta.</span>
        <p>Cuando construyo, también me estoy revelando. Por eso este perfil no existe para inflarme, sino para recordarme qué no debo traicionar.</p>
    </div>

    <div class="identity-grid">
        <div class="identity-card">
            <span class="card-icon">🧭</span>
            <div class="card-title">Propósito Moral</div>
            <p class="card-copy">No construyo por llenar espacio ni por producir ruido. Cada obra tiene que servir, ayudar o resolver algo real. Crear también es una forma de deber.</p>
            <div class="rule-box"><p>"Si no sirve de verdad, no merece llevar mi esfuerzo."</p></div>
        </div>

        <div class="identity-card">
            <span class="card-icon">⚖️</span>
            <div class="card-title">Verdad</div>
            <p class="card-copy">Me incomoda lo falso, lo inflado y lo vacío porque no solo fallan técnicamente: fallan en dignidad. Busco realidad, lógica y utilidad, no apariencia.</p>
            <div class="rule-box"><p>"No decoro la realidad. La respeto tal como es."</p></div>
        </div>

        <div class="identity-card">
            <span class="card-icon">🪞</span>
            <div class="card-title">Justicia hacia la Obra</div>
            <p class="card-copy">No quiero presumir. Quiero que lo verdadero no quede enterrado por timidez o exceso de silencio. Mostrar bien una obra honesta también es una forma de justicia.</p>
            <div class="rule-box"><p>"Esconder una obra verdadera también puede ser una forma de desperdiciarla."</p></div>
        </div>

        <div class="identity-card">
            <span class="card-icon">🧱</span>
            <div class="card-title">Nombre y Trabajo</div>
            <p class="card-copy">Mis proyectos no son objetos sueltos. Son extensión de mi carácter, de mi historia y de mi forma de responder al mundo. Lo que hago también habla por mí.</p>
            <div class="rule-box"><p>"Lo que construyo lleva mi nombre aunque nadie lo firme."</p></div>
        </div>

        <div class="identity-card">
            <span class="card-icon">🔍</span>
            <div class="card-title">Exigencia Interna</div>
            <p class="card-copy">No me basta con que algo funcione. Tiene que quedar correcto, digno, coherente y limpio. Cada detalle habla del tipo de hombre que lo dejó así.</p>
            <div class="rule-box"><p>"Mi exigencia no es capricho. Es dignidad aplicada al detalle."</p></div>
        </div>

        <div class="identity-card">

            <div class="card-title">Refugio para Otros</div>
            <p class="card-copy">No quiero construir solo para mí. Quiero dejar algo donde otros puedan entrar, aprender, crecer o apoyarse. La obra más noble siempre abre espacio humano.</p>
            <div class="rule-box"><p>"No levanto carpas para un día. Quiero levantar refugios que sirvan a otros."</p></div>
        </div>
