    <!-- LAS 10 LEYES -->
    <div class="card">
        <h2>Las 12 Leyes del Honor</h2>
        <span class="card-sub">Principios inquebrantables para cada día</span>
    </div>

    <div class="card"><h2><span class="num">1</span>Puntualidad Absoluta</h2><span class="card-sub">"El dominio del tiempo es el dominio de uno mismo"</span><p>Si quedas a una hora, llegas 10 minutos antes. Siempre. Sin excusas. Llegar tarde es decirle al otro que su tiempo no vale. Si vas a retrasarte, avisas antes de la hora, nunca después.</p><div class="rule-box"><p>"Mi puntualidad es la primera muestra de respeto. Si no respeto el tiempo del otro, no merezco su presencia."</p></div></div>

    <div class="card"><h2><span class="num">2</span>Cuidado Personal</h2><span class="card-sub">"Presentarse limpio y ordenado es honrar a quien te recibe"</span><p>Cada vez que te presentes ante alguien importante, hazlo limpio, arreglado y presentable. No se trata de ropa cara sino de respeto. Baño, ropa limpia, uñas cortadas, cabello ordenado. Sin negociación.</p><div class="rule-box"><p>"Me arreglo porque valoro a quien tengo enfrente. No es vanidad, es disciplina."</p></div></div>

    <div class="card"><h2><span class="num">3</span>Consideración Constante</h2><span class="card-sub">"Antes de actuar, piensa en cómo afecta al otro"</span><p>Anticipa las necesidades de los demás. No esperes a que te pidan ayuda. No esperes a que te digan qué les molesta. Observa, piensa, actúa. La consideración silenciosa vale más que mil palabras.</p><div class="rule-box"><p>"No necesito que me pidan las cosas. Me anticipo porque me importa."</p></div></div>

    <div class="card"><h2><span class="num">4</span>Leer el Ambiente</h2><span class="card-sub">"Los ojos hablan más que las palabras"</span><p>Aprende a percibir el estado emocional de quienes te rodean sin que te lo digan. Si alguien está callado, distingue si está cansado, molesto o tranquilo. Esta habilidad es la forma más alta de inteligencia emocional.</p><div class="rule-box"><p>"Escucho lo que no se dice. Observo lo que no se muestra. Entiendo lo que no se explica."</p></div></div>

    <div class="card"><h2><span class="num">5</span>Cada Momento es Único</h2><span class="card-sub">"Este instante no se repetirá jamás"</span><p>Cada conversación, cada encuentro, cada rato compartido es irrepetible. No mires el teléfono cuando alguien te habla. No pienses en lo que viene después. Vive el ahora con intensidad total.</p><div class="rule-box"><p>"Este momento no volverá. Lo vivo con todo lo que tengo."</p></div></div>

    <div class="card"><h2><span class="num">6</span>Paciencia Inquebrantable</h2><span class="card-sub">"La resistencia silenciosa forja el carácter"</span><p>No te apresures. No te frustres. No te rindas. Las cosas buenas toman tiempo. Si hoy no se dio, mañana será otro día. La paciencia no es esperar sin hacer nada, es seguir construyendo mientras el momento llega.</p><div class="rule-box"><p>"La paciencia no es debilidad. Es la fuerza de quien sabe que su momento llegará."</p></div></div>

    <div class="card"><h2><span class="num">7</span>Honestidad Total</h2><span class="card-sub">"La verdad es el cimiento de todo lo que construyas"</span><p>Sé siempre honesto. Ni mentiras pequeñas ni grandes. No aparentes ser algo que no eres. Si prometiste algo, cúmplelo. Si te equivocaste, admítelo. Tu palabra es tu honor.</p><div class="rule-box"><p>"Prefiero una verdad incómoda que una mentira cómoda. Mi palabra vale oro."</p></div></div>

    <div class="card"><h2><span class="num">8</span>Gratitud Permanente</h2><span class="card-sub">"Nada es obligación de nadie. Todo es un regalo"</span><p>Agradece cada gesto, cada comida, cada momento compartido. No des nada por hecho. La persona que cocina para ti, que te escucha, que te abre su puerta no tiene que hacerlo. Valora cada acto con palabras y acciones.</p><div class="rule-box"><p>"Todo lo que recibo es un regalo que no merezco pero que valoro con el alma."</p></div></div>

    <div class="card"><h2><span class="num">9</span>Autocontrol Total</h2><span class="card-sub">"La verdadera fuerza se mide en la calma, no en el grito"</span><p>Controla tus emociones. No explotes. No hagas escenas. No levantes la voz. Si sientes celos, respira y piensa antes de actuar. Si algo te molesta, procésalo internamente antes de expresarlo. La calma es poder.</p><div class="rule-box"><p>"Mi fuerza no se mide por cuánto grito, sino por cuánto me controlo cuando quiero gritar."</p></div></div>

    <div class="card"><h2><span class="num">10</span>Acciones Sobre Palabras</h2><span class="card-sub">"El amor, el respeto y el compromiso se demuestran haciendo"</span><p>Cualquiera dice cosas bonitas. La diferencia está en quien las respalda con hechos. No digas "me importas" si no lo demuestras. No digas "te apoyo" si no estás presente. Las palabras sin acciones son ruido vacío.</p><div class="rule-box"><p>"Cualquiera habla. Yo demuestro. Mis acciones son mi idioma."</p></div></div>

    <div class="card"><h2><span class="num">11</span>Presencia Sobre Pantalla</h2><span class="card-sub">"Si puedes estar ahí, estar ahí vale más que cualquier mensaje"</span><p>Las relaciones se construyen mirándose a los ojos, compartiendo tiempo, sosteniendo silencios y apareciendo cuando importa. La pantalla sirve, pero nunca debe reemplazar lo presencial cuando lo presencial es posible.</p><div class="rule-box"><p>"No me escondo detrás de una pantalla. Si puedo estar ahí, estoy ahí."</p></div></div>

    <div class="card"><h2><span class="num">12</span>Coraje con Calma</h2><span class="card-sub">"La valentía limpia no hace drama, pero tampoco se esconde"</span><p>El miedo no desaparece solo porque esperes más. Hay momentos en los que la calma debe caminar junto al coraje. No se trata de actuar por impulso, sino de dar el paso cuando ya existe claridad suficiente.</p><div class="rule-box"><p>"La valentía no es ausencia de miedo. Es actuar con calma cuando ya no hay excusa digna para seguir postergando."</p></div></div>

    <!-- CÓDIGO DEL SOLTERO -->
    <div class="section-divider">

    <div class="card">
        <h2>Código del Soltero</h2>
        <span class="card-sub">Disciplina personal mientras construyes tu camino</span>
    </div>

    <div class="card"><h2>Tu Enfoque Principal</h2><p>Mientras estás soltero, tu prioridad eres tú: tu trabajo, tu crecimiento, tus proyectos, tu disciplina. No buscas desesperadamente a alguien, te preparas para cuando esa persona llegue.</p><div class="rule-box"><p>"No busco a alguien que me complete. Me construyo completo para que cuando alguien llegue, le sume valor, no le pida que me salve."</p></div></div>

    <div class="card"><h2>Disciplina Personal Diaria</h2>
        <div class="val-item"><span class="val-icon">⏰</span><span class="val-text"><strong>Levántate temprano.</strong> Sin posponer alarma. El día lo gana quien madruga.</span></div>
        <div class="val-item"><span class="val-icon">🚿</span><span class="val-text"><strong>Aseo impecable siempre.</strong> No porque alguien te vaya a ver, sino por respeto propio.</span></div>
        <div class="val-item"><span class="val-icon">💪</span><span class="val-text"><strong>Trabaja con todo.</strong> Tu sustento es tu honor. Sea campo, oficina o código.</span></div>
        <div class="val-item"><span class="val-icon">📚</span><span class="val-text"><strong>Aprende algo cada día.</strong> Lee, investiga, practica. El conocimiento te hace valioso.</span></div>
        <div class="val-item"><span class="val-icon">🏠</span><span class="val-text"><strong>Mantén tu espacio ordenado.</strong> Cama tendida, ropa guardada, casa limpia. Siempre.</span></div>
        <div class="val-item"><span class="val-icon">🚫</span><span class="val-text"><strong>Cero vicios.</strong> Sin alcohol excesivo, sin drogas, sin hábitos destructivos.</span></div>
        <div class="val-item"><span class="val-icon">💰</span><span class="val-text"><strong>Ahorra.</strong> Aunque sea poco. La estabilidad económica es libertad.</span></div>
    </div>

    <div class="card"><h2>Si hay Alguien que te Interesa</h2>
        <div class="do-dont">
            <div class="do-col"><h4>Haz esto</h4><ul>
                <li>Acércate naturalmente, sin forzar</li>
                <li>Sé constante en tu trato</li>
                <li>Demuestra interés con acciones reales</li>
                <li>Dale espacio, no agobies</li>
                <li>Respeta su tiempo y sus decisiones</li>
                <li>Mejora cada día como persona</li>
                <li>Prepara el momento de confesarte con cuidado</li>
            </ul></div>
            <div class="dont-col"><h4>Nunca hagas esto</h4><ul>
                <li>Coquetear con otras frente a esa persona</li>
                <li>Ser inconsistente: un día la buscas, tres no</li>
                <li>Presionar por definir la relación</li>
                <li>Actuar como pareja sin serlo</li>
                <li>Tener celos sin derecho</li>
                <li>Hablar de otros intereses románticos frente a ella</li>
                <li>Perder la dignidad rogando</li>
            </ul></div>
        </div>
    </div>

    <div class="card"><h2>Cómo Invitar a Salir</h2>
        <h3>La fórmula correcta</h3>
        <div class="rule-box"><p>"Día concreto + Hora concreta + Plan concreto + Pregunta abierta"</p></div>
        <div class="do-dont">
            <div class="do-col"><h4>Así sí</h4><ul>
                <li>"El sábado quiero invitarte a caminar y comer un helado. ¿A las 3 te parece?"</li>
                <li>"Este viernes me gustaría que saliéramos. ¿Estás libre a las 5?"</li>
            </ul></div>
            <div class="dont-col"><h4>Así nunca</h4><ul>
                <li>"¿Quieres salir algún día?" (vago)</li>
                <li>"¿Cuándo estás libre?" (le pasas la responsabilidad)</li>
                <li>"Salgamos cuando puedas" (nunca va a pasar)</li>
            </ul></div>
        </div>

        <h3>Si cancela la cita</h3>
        <div class="table-wrap"><table>
            <tr><th>Situación</th><th>Tu respuesta</th></tr>
            <tr><td>Avisa con tiempo</td><td>"Tranquila, no hay problema. ¿Qué tal el próximo sábado?"</td></tr>
            <tr><td>Cancela el mismo día</td><td>"No te preocupes. Espero que todo esté bien. Ya saldremos otro día"</td></tr>
            <tr><td>No avisa y no aparece</td><td>Espera 30-40 min. Escribe: "¿Estás bien? Te estuve esperando"</td></tr>
            <tr><td>Cancela 3 o más veces</td><td>"Noto que no se ha dado. Si no puedes o no quieres, dime con confianza"</td></tr>
        </table></div>

        <h3>El día de la cita</h3>
        <div class="val-item"><span class="val-icon">📅</span><span class="val-text"><strong>Ese día es sagrado.</strong> No programes nada más.</span></div>
        <div class="val-item"><span class="val-icon">💰</span><span class="val-text"><strong>Dinero preparado.</strong> Lo planeado más un extra por si acaso.</span></div>
        <div class="val-item"><span class="val-icon">📱</span><span class="val-text"><strong>Teléfono en silencio.</strong> Solo emergencias reales.</span></div>
        <div class="val-item"><span class="val-icon">👀</span><span class="val-text"><strong>100% presente.</strong> Ojos, mente y corazón con esa persona.</span></div>
        <div class="val-item"><span class="val-icon">🏠</span><span class="val-text"><strong>Acompáñala de vuelta.</strong> Hasta su casa o donde sea seguro.</span></div>
        <div class="val-item"><span class="val-icon">💬</span><span class="val-text"><strong>Mensaje al llegar.</strong> "Llegué bien. Gracias por hoy."</span></div>
    </div>

    <div class="card"><h2>La Confesión</h2><span class="card-sub">"El momento en que expresas lo que sientes con valentía y dignidad"</span>
        <h3>Preparación</h3>
        <div class="val-item"><span class="val-icon">📍</span><span class="val-text"><strong>Lugar tranquilo y privado.</strong> Que puedan hablar sin presión.</span></div>
        <div class="val-item"><span class="val-icon">⏰</span><span class="val-text"><strong>Momento relajado.</strong> Después de un rato bonito juntos, no de golpe.</span></div>
        <div class="val-item"><span class="val-icon">🎭</span><span class="val-text"><strong>Sé tú mismo.</strong> No ensayes frases de películas. Habla con tu corazón.</span></div>

        <h3>Estructura de lo que dices</h3>
        <div class="timeline">
            <div class="t-step"><strong>Abre con vulnerabilidad:</strong> "Quiero decirte algo y me va a costar porque no soy bueno con las palabras"</div>
            <div class="t-step"><strong>Menciona cosas reales:</strong> Momentos específicos que vivieron juntos, detalles que solo tú notaste</div>
            <div class="t-step"><strong>Di lo que sientes:</strong> "Para mí no eres solo una amiga. Es algo más."</div>
            <div class="t-step"><strong>No presiones:</strong> "No te pido que me respondas nada ahora. Solo necesitaba que lo supieras"</div>
        </div>

        <h3>Si la respuesta es no</h3>
        <div class="rule-box"><p>Lo aceptas con dignidad. No ruegas, no insistes, no te enojas. Dices: "Lo entiendo. Gracias por escucharme." Y sigues adelante con la frente en alto.</p></div>
    </div>

    <div class="card">
        <h2>Código en Pareja</h2>
        <span class="card-sub">Reglas de honor cuando tienes a alguien a tu lado</span>
    </div>

    <div class="card"><h2>Principio Fundamental</h2><div class="rule-box"><p>"Tu pareja no es tuya. Es una persona libre que elige estar contigo cada día. Honra esa decisión con cada acción."</p></div></div>

    <div class="card"><h2>Trato Diario con tu Pareja</h2>
        <div class="val-item"><span class="val-icon">💬</span><span class="val-text"><strong>Comunícate.</strong> Pregúntale cómo le fue, escúchala de verdad, no por compromiso.</span></div>
        <div class="val-item"><span class="val-icon">🙏</span><span class="val-text"><strong>Agradece todo.</strong> Cada comida, cada gesto, cada momento. Nunca lo des por hecho.</span></div>
        <div class="val-item"><span class="val-icon">👁️</span><span class="val-text"><strong>Obsérvala.</strong> Nota cuando está cansada, triste o feliz sin que te lo diga.</span></div>
        <div class="val-item"><span class="val-icon">📱</span><span class="val-text"><strong>Responde sus mensajes.</strong> No la dejes en visto sin razón. Respeta su tiempo.</span></div>
        <div class="val-item"><span class="val-icon">🌹</span><span class="val-text"><strong>Detalles constantes.</strong> Los pequeños gestos frecuentes valen más que grandes gestos esporádicos.</span></div>
        <div class="val-item"><span class="val-icon">🤐</span><span class="val-text"><strong>Nunca la ridiculices en público.</strong> Si tienes un desacuerdo, háblalo en privado.</span></div>
        <div class="val-item"><span class="val-icon">🛡️</span><span class="val-text"><strong>Defiéndela.</strong> Si alguien la irrespeta frente a ti, la defiendes con firmeza y calma.</span></div>
    </div>

    <div class="card"><h2>En Casa de su Familia</h2>
        <h3>Al llegar</h3>
        <div class="table-wrap"><table>
            <tr><th>Acción</th><th>Detalle</th></tr>
            <tr><td>Tocar la puerta</td><td>Nunca entres sin que te abran aunque tengas confianza</td></tr>

                if (!query) return escapeHtml(text);
                var nText  = normalize(text);
                var nQuery = normalize(query);
                var result = '';
                var i = 0;
                while (i < text.length) {
                    var idx = nText.indexOf(nQuery, i);
                    if (idx < 0) {
                        result += escapeHtml(text.slice(i));
                        break;
                    }
                    result += escapeHtml(text.slice(i, idx));
                    result += '<mark>' + escapeHtml(text.slice(idx, idx + nQuery.length)) + '</mark>';
                    i = idx + nQuery.length;
                }
                return result;
            }

            function escapeHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function doSearch(query) {
                var q = query.trim();
                searchClear.classList.toggle('visible', q.length > 0);

                if (!q) {
                    activeSearchQuery = '';
                    clearHighlights();
                    searchMeta.textContent = '';
                    searchResults.innerHTML = '';
                    return;
                }

                activeSearchQuery = q;

                if (searchIndex.length === 0) buildSearchIndex();

                var nq = normalize(q);
                // Sistema apunta a Chrome/Firefox/Safari modernos — ES6+ es soportado
                var seen = new Set();
                var matches = [];

                searchIndex.forEach(function (block) {
                    var hay = normalize(block.title + ' ' + block.snippet);
                    if (hay.indexOf(nq) < 0) return;

                    // Deduplicar por sección + título
                    var key = block.secId + '|' + block.title;
                    if (!block.title && block.snippet) key = block.secId + '|' + block.snippet.slice(0, 60);
                    if (seen.has(key)) return;
                    seen.add(key);
                    matches.push(block);
                });

                var total = matches.length;

                if (total === 0) {
                    searchMeta.textContent = 'Sin resultados para "' + escapeHtml(q) + '"';
                    searchResults.innerHTML = '<div class="search-empty"><div class="search-empty-icon">◌</div>No se encontró nada para esta búsqueda.</div>';
                    return;
                }

                searchMeta.textContent = total + ' resultado' + (total !== 1 ? 's' : '') + ' para "' + q + '"';

                // Limitar a 30 para no saturar
                var shown = matches.slice(0, 30);
                searchResults.innerHTML = shown.map(function (block) {
                    var tag     = escapeHtml(block.meta.label);
                    var title   = block.title ? highlight(block.title, q) : '';
                    var snippet = block.snippet ? highlight(
                        block.snippet.length > 160 ? block.snippet.slice(0, 160) + '…' : block.snippet,
                        q
                    ) : '';
                    return '<button class="search-result-item" data-view="' + block.meta.view + '" data-sec="' + escapeHtml(block.secId) + '">' +
                        '<div class="result-tag">' + tag + '</div>' +
                        (title   ? '<div class="result-title">'   + title   + '</div>' : '') +
                        (snippet ? '<div class="result-snippet">' + snippet + '</div>' : '') +
                    '</button>';
                }).join('');

                // Bind result clicks
                searchResults.querySelectorAll('.search-result-item').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var targetView = btn.getAttribute('data-view');
                        var targetSec  = btn.getAttribute('data-sec');
                        var queryAtClick = activeSearchQuery;
                        // Cerrar overlay CONSERVANDO el filtro activo —
                        // el query sigue en la caja y los highlights permanecen en el contenido
                        collapseSearch();
                        activateView(targetView, { target: targetSec, updateHash: true });
                        setTimeout(function () {
                            var el = document.querySelector('#view-' + targetView + ' #' + targetSec);
                            if (el) {
                                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                                clearHighlights();
                                applyHighlights(el, queryAtClick);
                            }
                        }, 150);
                    });
                });
            }

            // collapseSearch: cierra el overlay pero CONSERVA el filtro activo
            // (query en caja, highlights en contenido, badge en botón)
            function collapseSearch() {
                searchOverlay.classList.remove('open');
                document.body.style.overflow = '';
                document.documentElement.style.overflow = '';
                // NO limpiamos activeSearchQuery ni searchInput.value ni highlights
                // El badge indica que hay filtro activo
                if (activeSearchQuery) {
                    searchTrigger.classList.add('search-active');
                } else {
                    searchTrigger.classList.remove('search-active');
                }
            }

            // clearFilter: desactiva el filtro completamente (query, highlights, badge)
            function clearFilter() {
                activeSearchQuery = '';
                clearHighlights();
                searchInput.value = '';
                searchClear.classList.remove('visible');
                searchMeta.textContent = '';
                searchResults.innerHTML = '';
                searchTrigger.classList.remove('search-active');
            }

            function openSearch() {
                searchOverlay.classList.add('open');
                // Prevenir scroll de fondo en iOS Safari también
                document.body.style.overflow = 'hidden';
                document.documentElement.style.overflow = 'hidden';
                // Si hay filtro activo, repoblar los resultados
                if (activeSearchQuery && searchInput.value) {
                    doSearch(searchInput.value);
                }
                setTimeout(function () { searchInput.focus(); }, 50);
            }

            function closeSearch() {
                // Escape / clic fuera: colapsa conservando el filtro
                collapseSearch();
            }

            // Bind search UI
            if (searchTrigger) {
                searchTrigger.addEventListener('click', function () {
                    if (searchOverlay.classList.contains('open')) {
                        collapseSearch();
                    } else {
                        openSearch();
                    }
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', function () { doSearch(searchInput.value); });
                searchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Escape') closeSearch();
                    if (e.key === 'Enter') doSearch(searchInput.value);
                });
            }

            if (searchClear) {
                // El botón ✕ dentro del overlay desactiva el filtro completamente
                searchClear.addEventListener('click', function () {
                    clearFilter();
                    searchInput.focus();
                });
            }

            if (searchOverlay) {
                searchOverlay.addEventListener('click', function (e) {
                    if (e.target === searchOverlay) closeSearch();
                });
            }

            document.addEventListener('keydown', function (e) {
                if ((e.key === 'k' && (e.ctrlKey || e.metaKey)) || e.key === '/') {
                    if (document.activeElement && ['INPUT','TEXTAREA'].indexOf(document.activeElement.tagName) >= 0) return;
                    e.preventDefault();
                    openSearch();
                }
                if (e.key === 'Escape' && searchOverlay && searchOverlay.classList.contains('open')) {
                    closeSearch();
                }
            });

            // Construir índice al inicio para que la primera búsqueda sea rápida
            setTimeout(buildSearchIndex, 400);

        })();
    </script>
</body>
</html>
